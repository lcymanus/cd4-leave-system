<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CD4 隊員請假表</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-8 px-4 antialiased text-slate-800">
  
  <div class="max-w-md mx-auto space-y-3">
    
    <div class="flex justify-end">
      <a href="https://leader.cascd4lrf.online/form.index" class="inline-flex items-center gap-1 text-xs font-medium text-slate-600 bg-white border border-slate-300 hover:bg-slate-50 py-2 px-3 rounded-md shadow-sm transition-colors">
        切換至高級團員表格
        <svg class="w-3.5 h-3.5 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"></path>
        </svg>
      </a>
    </div>

    <div class="bg-white rounded-lg shadow-md border border-slate-200 overflow-hidden">
      
      <div class="bg-slate-800 px-6 py-7 text-center border-b-4 border-blue-600">
        <h1 class="text-2xl font-bold text-white tracking-widest">CD4 隊員請假表</h1>
        <p class="text-sm mt-1.5 text-slate-300 font-medium">恆常訓練請假申請</p>
      </div>

      <form id="leaveForm" class="p-6 space-y-6">
        
        <div class="space-y-5">
          <div>
            <label class="block font-semibold text-slate-700 mb-1.5 text-sm">1. 請假日期 <span class="text-red-500">*</span></label>
            <select id="leaveDate" required class="w-full p-3 bg-white border border-slate-300 rounded-md focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-slate-700 transition-shadow appearance-none">
              <option value="" disabled selected>正在載入日期...</option>
            </select>
          </div>

          <div>
            <label class="block font-semibold text-slate-700 mb-1.5 text-sm">2. 中文姓名 <span class="text-red-500">*</span></label>
            <input type="text" id="chineseName" placeholder="例如：陳大文" required class="w-full p-3 bg-white border border-slate-300 rounded-md focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-slate-700 transition-shadow placeholder:text-slate-400">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block font-semibold text-slate-700 mb-1.5 text-sm">3. 所屬分隊 <span class="text-red-500">*</span></label>
              <select id="subUnit" required class="w-full p-3 bg-white border border-slate-300 rounded-md focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-slate-700 transition-shadow appearance-none">
                <option value="" disabled selected>請選擇</option>
                <option value="CD41">CD41</option>
                <option value="CD42">CD42</option>
                <option value="CD43">CD43</option>
                <option value="CD44">CD44</option>
              </select>
            </div>

            <div>
              <label class="block font-semibold text-slate-700 mb-1.5 text-sm">4. 隊員編號 <span class="text-red-500">*</span></label>
              <input type="text" id="casNumber" pattern="[A-Za-z]\d{4}" title="請輸入1個英文字母加4個數字，例如 E3308" placeholder="例如：E3308" required oninput="this.value = this.value.toUpperCase()" class="w-full p-3 bg-white border border-slate-300 rounded-md focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 uppercase font-mono text-slate-700 transition-shadow placeholder:text-slate-400">
            </div>
          </div>
        </div>

        <hr class="border-slate-200">

        <div>
          <label class="block font-semibold text-slate-700 mb-1.5 text-sm">5. 請假類別 <span class="text-red-500">*</span></label>
          <select id="leaveType" required class="w-full p-3 bg-white border border-slate-300 rounded-md focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-slate-700 transition-shadow appearance-none">
            <option value="" disabled selected>-- 點擊選擇請假原因 --</option>
            <option value="病假">病假</option>
            <option value="事假">事假</option>
            <option value="返學或考試">返學或考試</option>
          </select>

          <div id="sickLeaveNote" class="hidden mt-3 p-3 bg-amber-50 border-l-4 border-amber-500 rounded-r-md">
            <p class="text-sm text-amber-800 font-medium flex items-start">
              <svg class="w-5 h-5 mr-2 mt-0.5 text-amber-600 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
              <span>請在兩日內補交醫生紙給長官,以作紀錄</span>
            </p>
          </div>

          <div id="personalLeaveDiv" class="hidden mt-3 p-4 bg-slate-50 border border-slate-200 rounded-md">
            <label class="block font-semibold text-slate-800 mb-2 text-sm">詳細事假原因 <span class="text-xs font-normal text-slate-500">(長官需了解情況)</span> <span class="text-red-500">*</span></label>
            <input type="text" id="personalLeaveDetail" placeholder="請具體說明..." class="w-full p-3 bg-white border border-slate-300 rounded-md focus:outline-none focus:border-blue-600 focus:ring-1 focus:ring-blue-600 text-slate-700 transition-shadow placeholder:text-slate-400">
          </div>
        </div>

        <button type="submit" id="submitBtn" class="w-full mt-2 bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-md hover:bg-emerald-700 active:bg-emerald-800 transition-colors shadow-sm flex justify-center items-center">
          <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M20.52 3.449A11.95 11.95 0 0 0 12 0c-6.627 0-12 5.373-12 12 0 2.115.552 4.148 1.6 5.945L0 24l6.236-1.618A11.93 11.93 0 0 0 12 24c6.627 0 12-5.373 12-12 0-3.205-1.248-6.22-3.48-8.551zM12 21.974a9.92 9.92 0 0 1-5.06-1.385l-.36-.214-3.766.976 1.006-3.636-.236-.37A9.87 9.87 0 0 1 2.03 12C2.03 6.495 6.525 2 12.03 2c2.671 0 5.182 1.04 7.07 2.929C20.988 6.818 22.03 9.329 22.03 12c0 5.505-4.495 10-10.03 10l-.001-.026zm5.495-7.513c-.3-.15-1.785-.882-2.062-.982-.278-.101-.48-.15-.683.15-.202.301-.782.982-.958 1.183-.177.202-.354.225-.655.075-.301-.15-1.275-.47-2.428-1.503-.898-.806-1.503-1.802-1.68-2.103-.177-.301-.018-.465.132-.615.136-.135.301-.35.451-.525.15-.175.202-.301.301-.502.101-.202.05-.375-.025-.525-.075-.15-.683-1.65-.935-2.261-.247-.597-.497-.515-.683-.525-.177-.01-.38-.01-.58-.01-.2 0-.525.075-.8.375-.275.301-1.05 1.025-1.05 2.503s1.075 2.9 1.225 3.1c.15.2 2.115 3.225 5.125 4.525.716.308 1.275.493 1.71.63.717.228 1.368.195 1.884.118.578-.086 1.785-.73 2.035-1.435.25-.705.25-1.31.175-1.435-.075-.125-.275-.2-.575-.35z"/></svg>
          確認提交並通知長官
        </button>
      </form>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2pbjpqpWN0StsLaF-1r8vIgs5CHmkfunzJTNfl4iOb_0YPETYXFgmxMzRmKuXWgHQXQ/exec';
    
    document.getElementById('leaveType').addEventListener('change', function(e) {
      const type = e.target.value;
      const sickNote = document.getElementById('sickLeaveNote');
      const personalDiv = document.getElementById('personalLeaveDiv');
      const personalInput = document.getElementById('personalLeaveDetail');

      if (type === '病假') {
        sickNote.classList.remove('hidden');
        sickNote.classList.add('animate-[fadeIn_0.2s_ease-out]');
      } else {
        sickNote.classList.add('hidden');
      }

      if (type === '事假') {
        personalDiv.classList.remove('hidden');
        personalDiv.classList.add('animate-[fadeIn_0.2s_ease-out]');
        personalInput.required = true;
      } else {
        personalDiv.classList.add('hidden');
        personalInput.required = false;
        personalInput.value = '';
      }
    });

    window.addEventListener('DOMContentLoaded', async () => {
      if (localStorage.getItem('casName')) document.getElementById('chineseName').value = localStorage.getItem('casName');
      if (localStorage.getItem('casSubUnit')) document.getElementById('subUnit').value = localStorage.getItem('casSubUnit');
      if (localStorage.getItem('casNumber')) document.getElementById('casNumber').value = localStorage.getItem('casNumber');

      const dateSelect = document.getElementById('leaveDate');
      
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDates`);
        const dates = await response.json();
        
        if (!dates || dates.length === 0) {
          dateSelect.innerHTML = '<option disabled selected>暫時沒有訓練日期</option>';
          return;
        }
        
        dates.sort((a, b) => a.date.localeCompare(b.date));
        
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        dateSelect.innerHTML = '<option value="" disabled selected>-- 點擊選擇請假日期 --</option>';
        let validDatesCount = 0;

        dates.forEach(d => {
          const optionDate = new Date(d.date);
          optionDate.setHours(0, 0, 0, 0);

          if (isNaN(optionDate) || optionDate >= today) {
            const option = document.createElement('option');
            option.value = `${d.date} (${d.time})`;
            option.textContent = `${d.date} (${d.time})`;
            dateSelect.appendChild(option);
            validDatesCount++;
          }
        });

        if (validDatesCount === 0) {
          dateSelect.innerHTML = '<option disabled selected>暫時沒有未來的訓練日期</option>';
        }

      } catch (e) {
        dateSelect.innerHTML = '<option disabled selected>請先解決日期載入問題</option>';
      }
    });

    document.getElementById('leaveForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const originalBtnContent = submitBtn.innerHTML;
      
      submitBtn.disabled = true;
      submitBtn.innerHTML = `
        <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        正在傳送中...
      `;

      const date = document.getElementById('leaveDate').value;
      const name = document.getElementById('chineseName').value.trim();
      const subUnit = document.getElementById('subUnit').value;
      const number = document.getElementById('casNumber').value.toUpperCase().trim();
      
      const leaveType = document.getElementById('leaveType').value;
      let finalReason = leaveType;
      
      if (leaveType === '事假') {
        const detail = document.getElementById('personalLeaveDetail').value.trim();
        finalReason = `事假 - ${detail}`; 
      }

      localStorage.setItem('casName', name);
      localStorage.setItem('casSubUnit', subUnit);
      localStorage.setItem('casNumber', number);

      const payload = {
        action: 'submitLeave',
        date: date,
        name: name,
        subUnit: subUnit,
        number: number,
        reason: finalReason,
        role: 'member'
      };

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        
        const whatsappNumber = '85262763435';
        let whatsappMessage = `長官你好，本人已在系統提交請假申請，資料如下：\n\n`;
        whatsappMessage += `📅 日期：${date}\n`;
        whatsappMessage += `👤 姓名：${name}\n`;
        whatsappMessage += `🔢 編號：${number}\n`;
        whatsappMessage += `🏷️ 分隊：${subUnit}\n`;
        whatsappMessage += `📝 原因：${finalReason}`;
        
        if (leaveType === '病假') {
          whatsappMessage += `\n\n(註：復操時會補交醫生證明書)`;
        }

        const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(whatsappMessage)}`;

        alert('請假申請已成功上傳！將自動為您開啟 WhatsApp 通知長官。');
        window.open(whatsappUrl, '_blank'); 
        
        document.getElementById('leaveType').value = '';
        document.getElementById('leaveDate').value = '';
        document.getElementById('personalLeaveDetail').value = '';
        document.getElementById('personalLeaveDiv').classList.add('hidden');
        document.getElementById('sickLeaveNote').classList.add('hidden');
        
      } catch (e) {
        alert('提交失敗，請檢查網絡連線後重試。');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalBtnContent;
      }
    });
  </script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-2px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</body>
</html>
