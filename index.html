<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CD4 請假特快通道</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 via-slate-50 to-indigo-50/40 min-h-screen py-10 px-4 relative select-none antialiased">

  <div class="absolute top-4 right-4 bg-white/80 backdrop-blur-md p-2 rounded-xl shadow-sm border border-slate-200/60 flex items-center gap-2 text-sm z-10 transition-all hover:shadow-md">
    <input type="password" id="adminPassword" placeholder="輸入管理員密碼" class="p-1 px-2 border border-slate-300 rounded-md outline-none w-32 focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all text-xs">
    <button id="loginBtn" class="bg-slate-800 text-white px-3 py-1 rounded-md hover:bg-slate-700 font-medium transition text-xs shadow-sm">登入後台</button>
  </div>
  
  <div class="max-w-md mx-auto bg-white rounded-2xl shadow-xl shadow-slate-200/50 overflow-hidden mb-8 mt-14 md:mt-6 border border-slate-100">
    <div class="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 p-6 text-white text-center relative overflow-hidden">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,_var(--tw-gradient-stops))] from-indigo-500/10 via-transparent to-transparent"></div>
      <h1 class="text-2xl font-bold tracking-wide relative z-10">CD4 請假特快通道</h1>
      <p class="text-xs mt-2 opacity-75 tracking-wider font-light relative z-10">資料會自動同步至雲端 · 免重複填寫</p>
    </div>

    <form id="leaveForm" class="p-6 space-y-5 bg-white">
      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm tracking-wide">1. 恆常訓練日期 *</label>
        <select id="trainingDate" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none bg-white transition-all text-slate-800 font-medium shadow-sm cursor-pointer">
          </select>
      </div>

      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm tracking-wide">2. 中文姓名 *</label>
        <input type="text" id="chineseName" placeholder="例如：陳大文" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none transition-all text-slate-800 font-medium shadow-sm">
      </div>

      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm tracking-wide">3. 民安隊編號 *</label>
        <input type="text" id="casNumber" placeholder="例如：C12345" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none uppercase transition-all text-slate-800 font-mono font-bold tracking-wider shadow-sm">
      </div>

      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm tracking-wide">4. 請假原因 *</label>
        <select id="leaveReason" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 outline-none bg-white transition-all text-slate-800 font-medium shadow-sm cursor-pointer">
          <option value="" disabled selected>-- 請選擇請假原因 --</option>
          <option value="病假">病假 (請後補醫生紙)</option>
          <option value="返學/考試">返學 / 考試</option>
          <option value="返工">返工</option>
          <option value="其他">其他</option>
        </select>
      </div>

      <div id="otherReasonContainer" class="hidden animate-fadeIn">
        <label class="block font-bold text-rose-600 mb-1.5 text-sm tracking-wide">請註明詳細原因 *</label>
        <p class="text-xs text-slate-500 mb-2 leading-relaxed bg-slate-50 p-2 rounded-lg border border-slate-200/60">💡 請提供具體請假原因，以方便長官作評估及審批。</p>
        <textarea id="otherReasonInput" rows="2" placeholder="請輸入詳細原因..." class="w-full p-2.5 border border-rose-300 rounded-lg focus:border-rose-500 focus:ring-2 focus:ring-rose-100 outline-none resize-none transition-all text-slate-800 font-medium shadow-sm"></textarea>
      </div>

      <button type="submit" id="submitBtn" class="w-full mt-6 bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-emerald-700 active:scale-[0.99] transition-all flex justify-center items-center gap-2 shadow-lg shadow-emerald-600/20 text-base tracking-wide">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16" class="drop-shadow-sm">
          <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.9 7.9 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.521a6.6 6.6 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.56 6.56 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592m3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.73.73 0 0 0-.529.247c-.182.198-.691.677-.691 1.654s.71 1.916.81 2.049c.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
        </svg>
        用 WhatsApp 提交並同步
      </button>
    </form>
  </div>

  <div id="adminDashboard" class="max-w-3xl mx-auto bg-white rounded-2xl shadow-xl p-6 border border-slate-200/60 hidden mb-10 transition-all">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4 border-b border-slate-100 pb-4">
      <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
        <span>📋</span> CD4 雲端請假紀錄中央後台
      </h2>
      <button id="importBtn" class="bg-indigo-600 text-white font-semibold px-4 py-2 rounded-lg hover:bg-indigo-700 transition flex items-center gap-2 shadow-sm text-sm active:scale-[0.98]">
        🔄 從 Google Sheet 匯入最新數據
      </button>
    </div>

    <div class="mb-8 border-b border-slate-100 pb-6">
      <h3 class="text-base font-bold text-slate-700 mb-3 flex items-center gap-1.5">
        <span class="text-indigo-500">📅</span> 管理訓練日期
      </h3>
      <div class="flex flex-col md:flex-row gap-2 mb-4 bg-slate-50 p-3 rounded-xl border border-slate-200/50">
        <input type="date" id="newDateInput" class="p-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 flex-1 text-sm bg-white font-medium">
        <input type="text" id="newTimeInput" value="15:00-18:00" placeholder="時間 (例如: 15:00-18:00)" class="p-2 border border-slate-300 rounded-lg outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 flex-1 text-sm bg-white font-medium">
        <button id="addDateBtn" class="bg-slate-800 text-white px-5 py-2 rounded-lg hover:bg-slate-700 transition font-semibold text-sm shadow-sm">➕ 新增</button>
      </div>
      
      <div class="overflow-x-auto border border-slate-200 rounded-xl shadow-sm">
        <table class="w-full text-left border-collapse text-sm">
          <thead>
            <tr class="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
              <th class="p-3 pl-4">已設定日期</th>
              <th class="p-3">時間</th>
              <th class="p-3 text-center w-24">操作</th>
            </tr>
          </thead>
          <tbody id="dateListBody" class="divide-y divide-slate-100 text-slate-700 bg-white">
            </tbody>
        </table>
      </div>
    </div>
    
    <div>
      <h3 class="text-base font-bold text-slate-700 mb-3 flex items-center gap-1.5">
        <span class="text-emerald-500">☁️</span> 雲端請假紀錄
      </h3>
      <div class="overflow-x-auto border border-slate-200 rounded-xl shadow-sm">
        <table class="w-full text-left border-collapse text-sm">
          <thead>
            <tr class="bg-slate-50 text-slate-600 font-semibold border-b border-slate-200">
              <th class="p-3 pl-4">訓練日期</th>
              <th class="p-3">姓名</th>
              <th class="p-3">民安隊編號</th>
              <th class="p-3">請假原因</th>
            </tr>
          </thead>
          <tbody id="historyTableBody" class="divide-y divide-slate-100 text-slate-700 bg-white">
            <tr><td colSpan="4" class="p-8 text-center text-slate-400">請點擊上方按鈕匯入數據</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxRTLakBEb4yIjRLS24vdRYtT9LhiYZa_F3egTAeij_If6y7vY6IpRS9WXhiRPg2MzEMQ/exec';

    const trainingDateSelect = document.getElementById('trainingDate');
    const leaveReasonSelect = document.getElementById('leaveReason');
    const otherReasonContainer = document.getElementById('otherReasonContainer');
    const otherReasonInput = document.getElementById('otherReasonInput');
    const submitBtn = document.getElementById('submitBtn');

    // === 日期管理系統 ===
    function loadTrainingDates() {
      const dates = JSON.parse(localStorage.getItem('customTrainingDates')) || [];
      return dates;
    }

    function saveTrainingDates(dates) {
      dates.sort((a, b) => new Date(a.date) - new Date(b.date));
      localStorage.setItem('customTrainingDates', JSON.stringify(dates));
    }

    function renderFrontendDateSelect() {
      const dates = loadTrainingDates();
      trainingDateSelect.innerHTML = '';
      
      if (dates.length === 0) {
        const option = document.createElement('option');
        option.value = "";
        option.disabled = true;
        option.selected = true;
        option.textContent = "暫無可選訓練日期，請聯絡管理員";
        trainingDateSelect.appendChild(option);
      } else {
        const defaultOption = document.createElement('option');
        defaultOption.value = "";
        defaultOption.disabled = true;
        defaultOption.selected = true;
        defaultOption.textContent = "-- 請選擇訓練日期 --";
        trainingDateSelect.appendChild(defaultOption);

        dates.forEach(d => {
          const option = document.createElement('option');
          const fullDateString = `${d.date} (${d.time})`;
          option.value = fullDateString;
          option.textContent = fullDateString;
          trainingDateSelect.appendChild(option);
        });
      }
    }

    function renderAdminDateList() {
      const dateListBody = document.getElementById('dateListBody');
      const dates = loadTrainingDates();
      dateListBody.innerHTML = '';

      if (dates.length === 0) {
        dateListBody.innerHTML = `<tr><td colSpan="3" class="p-6 text-center text-slate-400 italic">尚未設定任何訓練日期</td></tr>`;
      } else {
        dates.forEach((d, index) => {
          const tr = document.createElement('tr');
          tr.className = "hover:bg-slate-50/80 transition-all";
          tr.innerHTML = `
            <td class="p-3 pl-4 font-semibold text-slate-800">${d.date}</td>
            <td class="p-3 font-medium text-slate-600">${d.time}</td>
            <td class="p-3 text-center">
              <button onclick="deleteDate(${index})" class="text-rose-600 hover:text-white hover:bg-rose-600 bg-rose-50 px-2.5 py-1 rounded-md text-xs font-bold border border-rose-200 transition-all">刪除</button>
            </td>
          `;
          dateListBody.appendChild(tr);
        });
      }
    }

    document.getElementById('addDateBtn').addEventListener('click', () => {
      const dateVal = document.getElementById('newDateInput').value;
      const timeVal = document.getElementById('newTimeInput').value.trim();
      
      if (!dateVal || !timeVal) {
        alert('請填寫完整的日期與時間！');
        return;
      }

      const dates = loadTrainingDates();
      const exists = dates.some(d => d.date === dateVal && d.time === timeVal);
      if (exists) {
        alert('該日期與時間已存在！');
        return;
      }

      dates.push({ date: dateVal, time: timeVal });
      saveTrainingDates(dates);
      
      renderAdminDateList();
      renderFrontendDateSelect();
      document.getElementById('newDateInput').value = '';
    });

    window.deleteDate = function(index) {
      if(confirm('確定要刪除這個訓練日期嗎？')) {
        const dates = loadTrainingDates();
        dates.splice(index, 1);
        saveTrainingDates(dates);
        renderAdminDateList();
        renderFrontendDateSelect();
      }
    };

    // === 初始化邏輯 ===
    window.addEventListener('DOMContentLoaded', () => {
      renderFrontendDateSelect();
      renderAdminDateList();

      if (localStorage.getItem('casName')) document.getElementById('chineseName').value = localStorage.getItem('casName');
      if (localStorage.getItem('casNumber')) document.getElementById('casNumber').value = localStorage.getItem('casNumber');
      
      leaveReasonSelect.value = '';
      otherReasonContainer.classList.add('hidden');
      otherReasonInput.value = '';
      otherReasonInput.required = false;
    });

    leaveReasonSelect.addEventListener('change', function() {
      if (this.value === '其他') {
        otherReasonContainer.classList.remove('hidden');
        otherReasonInput.required = true;
      } else {
        otherReasonContainer.classList.add('hidden');
        otherReasonInput.value = '';
        otherReasonInput.required = false;
      }
    });

    // 提交表單邏輯
    document.getElementById('leaveForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      submitBtn.disabled = true;
      submitBtn.className = "w-full mt-4 bg-slate-400 text-white font-bold py-3.5 px-4 rounded-xl flex justify-center items-center gap-2 cursor-not-allowed shadow-none";
      submitBtn.innerText = '🚀 正在啟動特快通道...';
      
      const date = trainingDateSelect.value;
      const name = document.getElementById('chineseName').value;
      const number = document.getElementById('casNumber').value.toUpperCase();
      
      let reason = leaveReasonSelect.value;
      if (reason === '其他') {
        const details = otherReasonInput.value.trim();
        reason = `其他 (${details})`;
      }

      localStorage.setItem('casName', name);
      localStorage.setItem('casNumber', number);

      const message = `📋 *CD4 恆常訓練請假*\n\n📅 日期：${date}\n👤 姓名：${name}\n🔢 編號：${number}\n❓ 原因：${reason}\n\n長官，我想申請以上日子請假，唔該晒！`;
      const whatsappUrl = `https://wa.me/85268476367?text=${encodeURIComponent(message)}`;

      const payload = JSON.stringify({ date, name, number, reason });
      const blob = new Blob([payload], { type: 'text/plain' });
      navigator.sendBeacon(GOOGLE_SCRIPT_URL, blob);

      window.location.href = whatsappUrl;

      setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.className = "w-full mt-6 bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-xl hover:bg-emerald-700 transition-all flex justify-center items-center gap-2 shadow-lg shadow-emerald-600/20 text-base tracking-wide";
        submitBtn.innerHTML = `用 WhatsApp 提交並同步`;
      }, 1500);
    });

    // === 管理員後台邏輯 ===
    const loginBtn = document.getElementById('loginBtn');
    const importBtn = document.getElementById('importBtn');
    const adminPasswordInput = document.getElementById('adminPassword');
    const adminDashboard = document.getElementById('adminDashboard');
    const historyTableBody = document.getElementById('historyTableBody');

    async function importDataFromCloud() {
      importBtn.innerHTML = '⏳ 正在讀取 Google Sheet...';
      importBtn.disabled = true;
      historyTableBody.innerHTML = `<tr><td colSpan="4" class="p-8 text-center text-indigo-600 font-semibold animate-pulse">正在實時匯入雲端數據...</td></tr>`;
      
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL, { method: 'GET', redirect: 'follow' });
        const records = await response.json();
        historyTableBody.innerHTML = '';
        
        if (!records || records.length === 0) {
          historyTableBody.innerHTML = `<tr><td colSpan="4" class="p-8 text-center text-slate-500">Google Sheet 目前沒有任何紀錄</td></tr>`;
        } else {
          records.reverse().forEach(item => {
            let displayDate = item.date; 
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-all";
            tr.innerHTML = `
              <td class="p-3 pl-4 font-semibold text-slate-800">${displayDate}</td>
              <td class="p-3 font-medium text-slate-700">${item.name}</td>
              <td class="p-3"><span class="bg-indigo-50 text-indigo-700 px-2.5 py-0.5 rounded-md text-xs font-bold font-mono border border-indigo-100">${item.number}</span></td>
              <td class="p-3 text-slate-600">${item.reason}</td>
            `;
            historyTableBody.appendChild(tr);
          });
        }
      } catch (error) {
        historyTableBody.innerHTML = `<tr><td colSpan="4" class="p-8 text-center text-rose-500 font-medium">匯入失敗！請確保 Google Sheet 有正確設定。</td></tr>`;
      } finally {
        importBtn.innerHTML = '🔄 從 Google Sheet 匯入最新數據';
        importBtn.disabled = false;
      }
    }

    loginBtn.addEventListener('click', function() {
      if (adminPasswordInput.value === '123456789') {
        adminDashboard.classList.remove('hidden');
        importDataFromCloud();
        adminDashboard.scrollIntoView({ behavior: 'smooth' });
      } else {
        alert('密碼錯誤！');
      }
    });

    importBtn.addEventListener('click', importDataFromCloud);
  </script>
</body>
</html>
