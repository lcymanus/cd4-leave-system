<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CD4 隊員請假表</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen py-8 px-4 antialiased">
  
  <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden border border-slate-200">
    
    <div class="bg-blue-700 p-5 text-white text-center">
      <h1 class="text-xl font-bold tracking-wide">CD4 隊員請假表</h1>
      <p class="text-xs mt-1 opacity-80">恆常訓練請假申請</p>
    </div>

    <form id="leaveForm" class="p-6 space-y-5">
      
      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm">1. 中文姓名 *</label>
        <input type="text" id="chineseName" placeholder="例如：陳大文" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-slate-800">
      </div>

      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm">2. 分隊組群 *</label>
        <select id="subUnit" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none bg-white text-slate-800">
          <option value="" disabled selected>-- 請選擇 --</option>
          <option value="CD41">CD41</option>
          <option value="CD42">CD42</option>
          <option value="CD43">CD43</option>
          <option value="CD44">CD44</option>
        </select>
      </div>

      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm">3. 民安隊編號 *</label>
        <input type="text" id="casNumber" pattern="[A-Za-z]\d{4}" title="請輸入1個英文字母加4個數字，例如 E3308" placeholder="例如：E3308" required oninput="this.value = this.value.toUpperCase()" class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none uppercase text-slate-800 font-mono">
      </div>

      <hr class="border-slate-200 my-4">

      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm">4. 請假日期 *</label>
        <select id="leaveDate" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none bg-white text-slate-800 font-medium">
          <option value="" disabled selected>正在載入日期...</option>
        </select>
      </div>

      <div>
        <label class="block font-bold text-slate-700 mb-1.5 text-sm">5. 請假原因 *</label>
        <input type="text" id="leaveReason" placeholder="例如：返工 / 考試 / 病假" required class="w-full p-2.5 border border-slate-300 rounded-lg focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-slate-800">
      </div>

      <button type="submit" id="submitBtn" class="w-full mt-4 bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 transition-colors shadow-sm">
        提交請假申請
      </button>
    </form>
  </div>

  <script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw2pbjpqpWN0StsLaF-1r8vIgs5CHmkfunzJTNfl4iOb_0YPETYXFgmxMzRmKuXWgHQXQ/exec';
    
    // 頁面載入時執行
    window.addEventListener('DOMContentLoaded', async () => {
      // 自動填入上次輸入的個人資料
      if (localStorage.getItem('casName')) document.getElementById('chineseName').value = localStorage.getItem('casName');
      if (localStorage.getItem('casSubUnit')) document.getElementById('subUnit').value = localStorage.getItem('casSubUnit');
      if (localStorage.getItem('casNumber')) document.getElementById('casNumber').value = localStorage.getItem('casNumber');

      const dateSelect = document.getElementById('leaveDate');
      
      try {
        const response = await fetch(`${GOOGLE_SCRIPT_URL}?action=getDates`);
        const dates = await response.json();
        
        if (!dates || dates.length === 0) {
          dateSelect.innerHTML = '<option disabled selected>暫時沒有訓練日期</option>';
          return;
        }
        
        // 確保日期排序
        dates.sort((a, b) => a.date.localeCompare(b.date));
        
        dateSelect.innerHTML = '<option value="" disabled selected>-- 請選擇請假日期 --</option>';
        dates.forEach(d => {
          const option = document.createElement('option');
          option.value = `${d.date} (${d.time})`;
          option.textContent = `${d.date} (${d.time})`;
          dateSelect.appendChild(option);
        });
      } catch (e) {
        dateSelect.innerHTML = '<option disabled selected>載入失敗，請檢查網絡連線</option>';
      }
    });

    // 處理表單提交
    document.getElementById('leaveForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      submitBtn.disabled = true;
      submitBtn.innerText = '正在提交...';

      const name = document.getElementById('chineseName').value.trim();
      const subUnit = document.getElementById('subUnit').value;
      const number = document.getElementById('casNumber').value.toUpperCase().trim();
      const date = document.getElementById('leaveDate').value;
      const reason = document.getElementById('leaveReason').value.trim();

      // 儲存個人資料方便下次使用
      localStorage.setItem('casName', name);
      localStorage.setItem('casSubUnit', subUnit);
      localStorage.setItem('casNumber', number);

      const payload = {
        action: 'submitLeave',
        date: date,
        name: name,
        subUnit: subUnit,
        number: number,
        reason: reason,
        role: 'member' // 確保寫入「隊員請假名單」
      };

      try {
        await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        
        alert('請假申請已成功提交！');
        document.getElementById('leaveReason').value = ''; // 清空原因，方便可能要請多日假
        document.getElementById('leaveDate').value = '';   // 重置日期
        
      } catch (e) {
        alert('提交失敗，請檢查網絡連線後重試。');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = '提交請假申請';
      }
    });
  </script>
</body>
</html>
